<!doctype html>
<html>
  <head>
    <link href="style.css" rel="stylesheet" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <link rel="shortcut icon" href="" />
  </head>
  <body>
    <div id="grid-container">
      <div id="header-area">
        <div class="jumbotron jumbotron-fluid">
          <div class="container">
            <h1 class="display-4">Dictionary</h1>
          </div>
        </div>
      </div>

      <form id="search-form" aria-label="Word Search">
        <input id="word-txtbox" type="text" placeholder="Search..." />
        <button id="btn-wordsearch" type="submit">Search</button>
      </form>

      <div id="results-section">
        <div id="result-sec" class="result" aria-label="polite"></div>
        <div id="display-results"></div>
        <div id="erro-section" class="result" aria-label="polite"></div>
        <div id="add-favourites">
          <button type="submit" aria-label="Add as favorite" id="btn-favorite">
            Upvote

            <i> 👍🏼 </i>
          </button>
        </div>

        <div id="favorite-words-section">
          <table class="table" id="fav-words-table">
            <thead>
              <tr>
                <th scope="col"></th>
                <th scope="col">My Favourite Words</th>
                <th scope="col"></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
  <script
    src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
    integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js"
    integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js"
    integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy"
    crossorigin="anonymous"
  ></script>
  <script src="index.js" defer></script>
</html>
