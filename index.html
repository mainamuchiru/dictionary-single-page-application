<!doctype html>
<html>
  <head>
    <link href="style.css" rel="stylesheet" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <link rel="shortcut icon" href="">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="grid-container">
      <section id="header-area">
        <div class="jumbotron jumbotron-fluid">
          <div class="container">
            <h1 class="display-4">Maina's Dictonary</h1>
            <p class="lead">Best Dictonary</p>
          </div>
        </div>
      </section>
      <!-- <div id="area-b"> -->
        <!-- <form id="search-form"> -->
      <div id="wordsearch-txt" class="container">
        <div class="row justify-content-center">
          <div class="col-md-6">
            <div class="search-container">
              <input
                id="word-txtbox"
                type="text"
                class="form-control search-input"
                placeholder="Search..."
              />
              <i class="fas fa-search search-icon"></i>
            </div>
          </div>
        </div>
      </div>
      <div id="btn-wordsearch">
        <button>Search</button>
      </div>
      <!-- </form> -->
      <!-- </div> -->

      <section id="results-section">
        <!-- <i class="fa-light fa-heart"></i> -->

        <!-- <audio controls>
         
        </audio> -->
        <!-- <h1>Omnipresent</h1>
          <h3>om·​ni·​pres·​ent</h3>
          <p>Present in all places at all times</p> -->
        <div id="display-results"></div>
        <div id="add-favourites">
          <button type="submit" aria-label="Add as favorite" id="btn-favorite">
            Add favourite
            <i class="fa-regular fa-heart">  </i>
          </button>
        </div>

        <div id="favorite-words-section">
          <table class="table" id="fav-words-table">
            <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">Word</th>
                <th scope="col">Favorite</th>
                
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </div>
  </body>
